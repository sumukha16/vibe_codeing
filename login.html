<!DOCTYPE html>
<html>
<head>
    <style>
        body {
           
            margin-top:30px;
            padding: 10px;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ff6347;
        }

        .login {
            border: 1px solid #ffe6a;
            width: 400px;
            height: 500px;
            background:url('logo.jpg') ;
            color: #ff6347;
            border-radius: 20px;
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.5);
            background-size: 500px 420px;
            background-position: center;
            overflow:hidden;
        }

        form {
            display: block;
            box-sizing: border-box;
            padding: 40px;
            backdrop-filter: brightness(20%);
            width: 100%;
            height: 100%;
            flex-direction: column;
            display: flex;
            gap: 5px;
        }

        h1 {
            font-weight: normal;
            text-shadow: 0px 0px 2px rgba(0, 0, 0, 0.7);
            margin-bottom: 60px;
            text-align: center;
        }

        label {
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            padding-left: 10px;
        }

        input {
            background: rgba(255, 255, 255, 0.1);
            height: 40px;
            line-height: 40px;
            padding: 0px 20px;
            border: 1px solid #ff6347;
            margin-bottom: 20px;
            color:#ff6347;
        }

button {
  padding: 12.5px 30px;
  border: 2px;
  border-radius: 100px;
  background-color: #ff6347;
  color:#ffffff;
  font-weight: Bold;
  transition: all 0.5s;
  -webkit-transition: all 0.35s;
font-size:20px;
font-family:Condensed,Bold Italic;
}

button:hover {
  background-color: #ff6347 ;
  box-shadow: 3 3 50px #6fc5ff50;
  transform: scale(1.1);
}

button:active {
  background-color:  #ff6347;
  transition: all 0.5s;
  -webkit-transition: all 0.25s;
  box-shadow: none;
  transform: scale(0.98);
}
    </style>
</head>
<body>
    <center>
        <div class="login">
            <form action="create.html ">
                <h1>LOG IN</h1>
                <label for="username" style="color:#ff6347">Username</label>
                <input type="text" id="username">
                <label for="password" style="color:#ff6347">Password</label>
                <input type="password" id="password">
               <button>Log In</button>
            </form>
        </div>
    </center>
</body>
</html>
